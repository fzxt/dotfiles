
# Mouse support (off to allow terminal URL clicking)
set -g mouse off
set -ga terminal-overrides ',xterm*:smcup@:rmcup@'
set -ga terminal-overrides ',xterm-256color:Tc'
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ',tmux-256color:Tc'

# Extended keys (pass Ctrl+Shift combos through to apps)
set -s extended-keys always

# Terminal features (extkeys must be included here, not in a separate line)
set -g terminal-features ",*:clipboard:ccolour:cstyle:focus:title:extkeys"


# Disable bracketed paste mode globally
set -s set-clipboard on

# Vi copy mode (Ctrl+B v to enter)
setw -g mode-keys vi
bind v copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# Hide/show pane
bind b break-pane -d
bind B join-pane -v -s !

# Navigate panes with vim keys (prefix + hjkl)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes with Alt+Arrow (no prefix needed)
bind -n M-Left resize-pane -L 5
bind -n M-Right resize-pane -R 5
bind -n M-Up resize-pane -U 5
bind -n M-Down resize-pane -D 5

# Split panes without prefix (Alt+D / Alt+Shift+D)
bind -n M-d split-window -h
bind -n M-D split-window -v

# Pane borders
set -g pane-border-style fg=colour237
set -g pane-active-border-style fg=colour246

# Status bar
if "[ $(tput colors) -ge 256 ]" {
  set -g status-style "fg=colour232 bg=colour22"
  set -g status-left-style "fg=colour232 bg=colour22"
  set -g status-right-style "fg=colour232 bg=colour22"
  set -g window-status-current-style "fg=colour232 bg=colour28 bold"
  set -g window-status-activity-style "fg=colour232 bg=colour22"
  set -g message-style "fg=colour232 bg=colour28"
  set -g mode-style "fg=colour232 bg=colour28"
}
set -g status-left ' '
set -g status-right ' #h:#S  %m/%d %H:%M '
set -g status-left-length 5
set -g status-right-length 40
set -g window-status-format ' #I #W '
set -g window-status-current-format ' #I #W * '
# Auto-renumber windows when one is closed
set -g renumber-windows on

set -g status-position bottom
